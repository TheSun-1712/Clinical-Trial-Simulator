model_name: sshleifer/tiny-gpt2
learning_rate: 2.0e-5
batch_size: 2
gradient_accumulation_steps: 1
num_generations: 2
lora_rank: 4
lora_alpha: 8
lora_dropout: 0.05
lora_target_modules: ["c_attn", "c_proj"]
max_prompt_length: 256
max_completion_length: 64
max_steps: 1
checkpoint_every: 1
early_stop_window: 50
early_stop_min_improvement: 0.10
log_backend: none
backend: trl
group_size: 2
episodes_per_step: 2
seed: 17
output_checkpoint: artifacts/policy/latest_llm_smoke.json
checkpoints_dir: artifacts/policy/checkpoints_smoke
trl_prompt_samples: 4
trl_output_dir: artifacts/trl_smoke
upload_repo: ""
upload_private: false
reward_mode: text
